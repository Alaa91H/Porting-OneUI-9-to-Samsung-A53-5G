# ============================================================
# debloat.conf — إعدادات إزالة التضخيم
# المستويات: lite | standard | aggressive
# كل مستوى يضمّن ما قبله.
# ============================================================

[levels]
lite        = remove lite
standard    = remove lite standard
aggressive  = remove lite standard aggressive

[options]
# حذف APK ودلائل التطبيق من system/product/system_ext
delete_files       = true
# إفراغ (truncate) دون حذف (أقل ألماً عند فشل الفلاش)
empty_instead      = false
# إبقاء GApps (Google services) حتى في المستوى العدواني
keep_gapps         = true
# إزالة التطبيقات الإقليمية/التسويقية
remove_carrier     = true
remove_oem_telemetry = true

[gapps_keep]
com.google.android.gms
com.google.android.gsf
com.google.android.googlequicksearchbox
com.google.android.setupwizard
com.android.vending
com.google.android.webview
com.google.android.inputmethod.latin
com.google.android.ext.shared
com.google.android.ext.services
com.android.webview

[samsung_critical_keep]
# تطبيقات سامسونج جوهرية لاستقرار النظام — لا تُمسح أبداً
com.android.systemui
com.android.settings
com.samsung.android.knox.containeragent
com.samsung.android.knox.attestation
com.samsung.android.securityfw
com.sec.android.app.launcher
com.android.keyguard
com.android.phone
com.android.providers.settings
com.android.providers.contacts
com.android.providers.media
com.android.providers.calendar
